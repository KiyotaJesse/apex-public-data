<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>APEX 控制甲板</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0C1117;--panel:#131A23;--panel2:#1A2330;--line:#263140;--ink:#E8EDF4;--ink2:#8C9BAD;--ink3:#5A6879;
--gold:#D9A441;--bull:#35B98F;--bear:#E15A6E;--glow:rgba(217,164,65,.14)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",-apple-system,sans-serif;padding:14px 12px 96px}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hd h1{font-size:17px;margin:0;letter-spacing:.06em}
.hd .led{width:9px;height:9px;border-radius:50%;background:var(--ink3)}
.hd .led.ok{background:var(--bull);box-shadow:0 0 8px var(--bull)}
.hd .led.wait{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.sub{font-size:11px;color:var(--ink3);font-family:Consolas,monospace;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
.chd{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--panel2);border-bottom:1px solid var(--line)}
.chd b{font-size:14px;letter-spacing:.04em}
.chd .mode{margin-left:auto;font-size:10.5px;letter-spacing:.1em;padding:2px 10px;border:1px solid;border-radius:99px}
.mode.live{color:var(--bull);border-color:var(--bull)}
.mode.off{color:var(--ink3);border-color:var(--ink3)}
.mode.paper{color:var(--gold);border-color:var(--gold)}
.row{display:grid;grid-template-columns:1fr auto;gap:4px 12px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row.changed{background:var(--glow)}
.lb{font-size:13px}
.lb small{display:block;font-size:10.5px;color:var(--ink3);margin-top:1px}
.lb .dgr{color:var(--bear);font-size:10px;border:1px solid var(--bear);border-radius:3px;padding:0 4px;margin-left:6px;vertical-align:1px}
.val{font-family:Consolas,monospace;font-size:14px;text-align:right;min-width:74px}
.val input[type=number]{width:76px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--ink);font:inherit;text-align:right;padding:5px 7px;outline:none}
.val input:focus{border-color:var(--gold)}
.sld{grid-column:1/3}
input[type=range]{width:100%;accent-color:var(--gold);height:22px}
.tgl{position:relative;width:52px;height:28px;background:var(--line);border-radius:99px;cursor:pointer;transition:.18s}
.tgl.on{background:var(--bull)}
.tgl i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.18s}
.tgl.on i{left:27px}
.ks .tgl.on{background:var(--bear)}
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--panel2);border-top:1px solid var(--gold);padding:12px 14px;display:flex;align-items:center;gap:12px}
.bar .n{font-size:13px;color:var(--ink2)}
.bar .n b{color:var(--gold);font-size:16px}
.btn{margin-left:auto;background:var(--gold);color:#141414;border:none;border-radius:8px;font-size:14.5px;font-weight:700;padding:11px 26px;letter-spacing:.06em}
.btn:disabled{background:var(--line);color:var(--ink3)}
.btn2{background:none;border:1px solid var(--ink3);color:var(--ink2);border-radius:8px;font-size:13px;padding:10px 16px}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-end;z-index:50}
.mask.show{display:flex}
.sheet{background:var(--panel);border-top:2px solid var(--gold);border-radius:14px 14px 0 0;width:100%;max-height:72vh;overflow:auto;padding:18px 16px 22px}
.sheet h3{margin:0 0 10px;font-size:15px}
.diff{font-family:Consolas,monospace;font-size:13px;line-height:2;margin-bottom:14px}
.diff .d{color:var(--bear);font-weight:700}
.warn{font-size:12px;color:var(--bear);border:1px solid var(--bear);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:none}
.warn.show{display:block}
.note{font-size:11.5px;color:var(--ink3);margin:4px 2px 14px;line-height:1.7}
.ro{background:var(--bear);color:#fff;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="hd"><div class="led" id="led"></div><h1>APEX 控制甲板</h1><span class="sub" id="syncst"></span></div>
<div class="sub" id="meta">載入配置中…</div>
<div class="ro" id="ro">⚠️ 非 Telegram 環境:唯讀模式(調整送出需從 /control 開啟)</div>
<div id="cards"></div>
<div class="note">每項參數都有寫死在交易引擎裡的硬邊界(這個介面繞不過)。送出後 D 於 ≤60 秒熱載入生效,無需重啟;生效後上方燈號轉綠並收到 Telegram 通知。標 <span style="color:var(--bear)">危</span> 的項目改動會直接影響實盤風險。</div>
<div class="bar"><span class="n">待送出 <b id="cnt">0</b> 項</span><button class="btn2" id="reset">還原</button><button class="btn" id="send" disabled>送出變更</button></div>
<div class="mask" id="mask"><div class="sheet">
<h3>⚠️ 確認變更</h3>
<div class="warn" id="dwarn">包含高風險項目(實盤開關/槓桿/killswitch),請逐項確認後再送出。</div>
<div class="diff" id="diff"></div>
<button class="btn" id="go" style="width:100%">確認送出 → D 60秒內生效</button>
<button class="btn2" id="back" style="width:100%;margin-top:8px">返回修改</button>
</div></div>
<script>
const TG=window.Telegram&&window.Telegram.WebApp;
const canSend=!!(TG&&typeof TG.sendData==="function");
if(TG){TG.ready();TG.expand();}
if(!canSend)document.getElementById('ro').style.display='block';
const META={
 b1:{name:'B1 盤整破位做空',rows:[
  ['live_enabled','實盤開關','關=停止新開倉(舊倉照管)','bool',1],
  ['risk_pct','單筆風險','每筆最多虧損佔權益比例','pct',1,0.0001,0.02,0.0001],
  ['leverage','槓桿上限','實際會依爆倉線動態下調','int',1,1,50,1],
  ['max_positions','最大同時持倉','0=只平不開','int',0,0,5,1],
  ['daily_loss_limit_pct','當日虧損熔斷','當日虧到此比例自動停','pct',0,0.005,0.10,0.005],
  ['cycle_seconds','掃描週期(秒)','越短越即時、API消耗越大','int',0,60,3600,30]]},
 tl:{name:'TL 順勢回踩做多',rows:[
  ['live_enabled','實盤開關','','bool',1],
  ['risk_pct','單筆風險','目前降檔中(walk-forward近季EV轉負)','pct',1,0.0001,0.02,0.0001],
  ['leverage','槓桿上限','','int',1,1,50,1],
  ['max_positions','最大同時持倉','','int',0,0,5,1],
  ['max_hold_h','最長持倉(小時)','到時強制平倉','int',0,4,168,4],
  ['cycle_seconds','掃描週期(秒)','','int',0,60,7200,60]]},
 rs:{name:'RS 相對強弱輪動',rows:[
  ['live_enabled','實盤開關','目前 paper 觀察中,開=真金上陣','bool',1],
  ['risk_pct','單筆風險','','pct',1,0.0001,0.02,0.0001],
  ['leverage','槓桿上限','','int',1,1,50,1],
  ['max_positions','最大同時持倉','','int',0,0,3,1],
  ['cycle_seconds','掃描週期(秒)','RS本質低頻,建議≥3600','int',0,600,86400,600]]},
 global:{name:'全域風控',rows:[
  ['same_dir_max','同方向倉位上限','跨策略合計','int',0,1,6,1],
  ['total_drawdown_halt_pct','總回撤熔斷','距峰值回撤達此比例全停','pct',0,0.05,0.30,0.01],
  ['killswitch','🔴 KILLSWITCH 全系統急停','開=立即停止所有策略開倉','bool',1]]}
};
let CFG=null,BASE={},PEND={};
const fmt=(k,v,kind)=>kind==='pct'?(v*100).toFixed(2).replace(/\.?0+$/,'')+'%':String(v);
async function load(){
 try{
  const r=await fetch('./dashboard.json?t='+Date.now(),{cache:'no-store'});
  const d=await r.json();const tc=d.tama_config||{};CFG=tc.current||{};
  const ap=tc.applied||{};
  document.getElementById('meta').textContent='最後變更: '+((CFG._meta||{}).updated||'?').slice(0,16)+' · '+((CFG._meta||{}).by||'').slice(0,42);
  const fresh=ap.applied_at&&(Date.now()-new Date(ap.applied_at).getTime()<15*60*1000);
  const led=document.getElementById('led');led.className='led '+(ap.applied_sha?'ok':'wait');
  document.getElementById('syncst').textContent=ap.applied_sha?('已生效 '+String(ap.applied_sha).slice(0,7)):'待同步';
  BASE={};
  for(const sect in META)for(const row of META[sect].rows)BASE[sect+'.'+row[0]]=(CFG[sect]||{})[row[0]];
  render();
 }catch(e){
  document.getElementById('meta').textContent='⚠ 無法取得線上配置(顯示預設值,唯讀): '+String(e).slice(0,60);
  CFG={b1:{live_enabled:true,risk_pct:0.02,leverage:50,max_positions:5,daily_loss_limit_pct:0.10,cycle_seconds:60},
       tl:{live_enabled:true,risk_pct:0.01,leverage:50,max_positions:2,max_hold_h:48,cycle_seconds:60},
       rs:{live_enabled:false,risk_pct:0.01,leverage:50,max_positions:3,cycle_seconds:3600},
       global:{same_dir_max:3,total_drawdown_halt_pct:0.25,killswitch:false},_meta:{}};
  BASE={};
  for(const sect in META)for(const row of META[sect].rows)BASE[sect+'.'+row[0]]=(CFG[sect]||{})[row[0]];
  render();
 }
}
function render(){
 const box=document.getElementById('cards');box.innerHTML='';
 for(const sect in META){
  const m=META[sect];const c=CFG[sect]||{};
  const card=document.createElement('div');card.className='card';
  let mode='';
  if('live_enabled' in c)mode=c.live_enabled?'<span class="mode live">LIVE</span>':(sect==='rs'?'<span class="mode paper">PAPER</span>':'<span class="mode off">OFF</span>');
  if(sect==='global')mode=c.killswitch?'<span class="mode off" style="color:var(--bear);border-color:var(--bear)">HALTED</span>':'<span class="mode live">ARMED</span>';
  card.innerHTML='<div class="chd"><b>'+m.name+'</b>'+mode+'</div>';
  for(const row of m.rows){
   const[key,label,hint,kind,dgr,lo,hi,step]=row;
   const full=sect+'.'+key;const cur=PEND[full]!==undefined?PEND[full]:BASE[full];
   const div=document.createElement('div');div.className='row'+(PEND[full]!==undefined?' changed':'')+(key==='killswitch'?' ks':'');
   let ctl='';
   if(kind==='bool'){
    ctl='<div class="tgl'+(cur?' on':'')+'" data-k="'+full+'"><i></i></div>';
   }else{
    const disp=kind==='pct'?(cur*100):cur;
    const dlo=kind==='pct'?lo*100:lo,dhi=kind==='pct'?hi*100:hi,dstep=kind==='pct'?step*100:step;
    ctl='<div class="val"><input type="number" data-k="'+full+'" data-kind="'+kind+'" min="'+dlo+'" max="'+dhi+'" step="'+dstep+'" value="'+(+disp.toFixed(4))+'">'+(kind==='pct'?' %':'')+'</div>';
    div.innerHTML='<div class="lb">'+label+(dgr?'<span class="dgr">危</span>':'')+'<small>'+(hint||('範圍 '+dlo+'~'+dhi))+' · 硬邊界 '+dlo+'~'+dhi+(kind==='pct'?'%':'')+'</small></div>'+ctl
     +'<div class="sld"><input type="range" data-r="'+full+'" data-kind="'+kind+'" min="'+dlo+'" max="'+dhi+'" step="'+dstep+'" value="'+disp+'"></div>';
    card.appendChild(div);continue;
   }
   div.innerHTML='<div class="lb">'+label+(dgr?'<span class="dgr">危</span>':'')+'<small>'+(hint||'')+'</small></div>'+ctl;
   card.appendChild(div);
  }
  box.appendChild(card);
 }
 box.querySelectorAll('.tgl').forEach(t=>t.onclick=()=>{const k=t.dataset.k;setVal(k,!(PEND[k]!==undefined?PEND[k]:BASE[k]))});
 box.querySelectorAll('input[type=number]').forEach(inp=>inp.onchange=()=>{
  let v=parseFloat(inp.value);if(isNaN(v))return;
  v=Math.min(+inp.max,Math.max(+inp.min,v));
  setVal(inp.dataset.k,inp.dataset.kind==='pct'?v/100:(inp.dataset.kind==='int'?Math.round(v):v));});
 box.querySelectorAll('input[type=range]').forEach(sl=>sl.oninput=()=>{
  let v=parseFloat(sl.value);
  setVal(sl.dataset.r,sl.dataset.kind==='pct'?v/100:(sl.dataset.kind==='int'?Math.round(v):v));});
}
function setVal(k,v){
 if(v===BASE[k]||(typeof v==='number'&&Math.abs(v-BASE[k])<1e-9))delete PEND[k];else PEND[k]=v;
 render();sync();
}
function sync(){
 const n=Object.keys(PEND).length;
 document.getElementById('cnt').textContent=n;
 document.getElementById('send').disabled=!n||!canSend;
}
document.getElementById('reset').onclick=()=>{PEND={};render();sync()};
document.getElementById('send').onclick=()=>{
 const DGR=new Set();
 for(const s in META)for(const r of META[s].rows)if(r[4])DGR.add(s+'.'+r[0]);
 let hasD=false,html='';
 for(const k in PEND){
  const kind=(()=>{for(const s in META)for(const r of META[s].rows)if(s+'.'+r[0]===k)return r[3];return 'raw'})();
  const d=DGR.has(k);if(d)hasD=true;
  html+=(d?'<span class="d">⚠ ':'<span>')+k+'</span>: '+fmt(k,BASE[k],kind)+' → <b>'+fmt(k,PEND[k],kind)+'</b><br>';
 }
 document.getElementById('diff').innerHTML=html;
 document.getElementById('dwarn').className='warn'+(hasD?' show':'');
 document.getElementById('mask').className='mask show';
};
document.getElementById('back').onclick=()=>document.getElementById('mask').className='mask';
document.getElementById('go').onclick=()=>{
 if(!canSend)return;
 TG.sendData(JSON.stringify({action:'set_config',changes:PEND}));
};
load();
</script>
</body>
</html>
